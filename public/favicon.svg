<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#0d0d0d"/>

  <!-- Outer C-arc (green, open on right) -->
  <path d="M80,20 A38,38 0 1,0 80,80" stroke="#c8f135" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Middle ring -->
  <circle cx="50" cy="50" r="22" stroke="#c8f135" stroke-width="4" fill="none" opacity="0.5"/>

  <!-- Crosshair lines -->
  <line x1="50" y1="28" x2="50" y2="38" stroke="#c8f135" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="50" y2="72" stroke="#c8f135" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="50" x2="38" y2="50" stroke="#c8f135" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="50" x2="72" y2="50" stroke="#c8f135" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#c8f135"/>
</svg>
